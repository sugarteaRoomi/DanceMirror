<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dance Mirror — Camera</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
video {
    width: 100vw; height: 100vh;
    object-fit: contain;
    transform: scaleX(-1);
}
</style>
</head>
<body>
<video id="cam" autoplay playsinline></video>
<script>
navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1920 }, height: { ideal: 1080 } } })
    .then(function(stream) { document.getElementById('cam').srcObject = stream; })
    .catch(function() { document.body.innerHTML = '<p style="color:#fff;text-align:center;padding:40px;">Camera access denied</p>'; });
</script>
</body>
</html>
